version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: proraf-db
    environment:
      POSTGRES_USER: proraf
      POSTGRES_PASSWORD: proraf
      POSTGRES_DB: proraf_db
    ports:
      - "5432:5432"
    volumes:
      - proraf-data:/var/lib/postgresql/data
    networks:
      - proraf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proraf -d proraf_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicação em desenvolvimento
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: proraf-api-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://proraf:proraf@db:5432/proraf_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proraf-network
    profiles:
      - development

  # Aplicação em produção
  api-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proraf-api-prod
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://proraf:proraf@db:5432/proraf_db
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proraf-network
    profiles:
      - production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (opcional para produção)
  nginx:
    image: nginx:alpine
    container_name: proraf-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-prod
    networks:
      - proraf-network
    profiles:
      - production
    restart: unless-stopped

networks:
  proraf-network:
    driver: bridge

volumes:
  proraf-data:
    driver: local